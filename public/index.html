<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会议纪要</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/font-awesome.min.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-logo">&#9670; 会议纪要</div>
    <div class="navbar-links">
      <a href="index.html" class="active">会议列表</a>
      <a href="glossary.html">词汇表</a>
    </div>
  </nav>

  <div class="container">

    <!-- Upload Area -->
    <div class="card">
      <div class="card-title"><i class="fa fa-cloud-upload"></i> 上传音频 / 视频</div>
      <div class="upload-options">
        <label>会议类型：</label>
        <div class="meeting-type-pills">
          <input type="radio" name="meetingType" id="mt-general" value="general" checked>
          <label for="mt-general">通用</label>

          <input type="radio" name="meetingType" id="mt-weekly" value="weekly">
          <label for="mt-weekly">周会</label>

          <input type="radio" name="meetingType" id="mt-tech" value="tech">
          <label for="mt-tech">技术讨论</label>

          <input type="radio" name="meetingType" id="mt-customer" value="customer">
          <label for="mt-customer">客户</label>
        </div>
      </div>
      <div class="form-group">
        <label for="recipientEmails">收件人邮箱</label>
        <input type="text" class="form-control" id="recipientEmails" placeholder="多个邮箱用逗号分隔，留空则发送给默认收件人">
        <small style="color:var(--aws-secondary);">例：alice@example.com, bob@example.com</small>
      </div>
      <div class="upload-area" id="upload-area">
        <input type="file" id="upload-input" accept=".mp4,.mp3,.m4a,.ogg">
        <i class="fa fa-cloud-upload"></i>
        <p>拖放 MP4 / MP3 / OGG 文件到此处，或点击选择</p>
        <p class="upload-hint">支持 MP4、MP3、M4A、OGG 格式</p>
      </div>
      <div class="upload-progress" id="upload-progress">
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-text" id="progress-text">上传中...</div>
      </div>
    </div>

    <!-- Meeting List -->
    <div class="card">
      <div class="card-title"><i class="fa fa-list"></i> 会议列表</div>
      <div class="meeting-filter-bar" id="filter-bar">
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">全部</button>
          <button class="filter-tab" data-filter="general">通用</button>
          <button class="filter-tab" data-filter="weekly">周会</button>
          <button class="filter-tab" data-filter="tech">技术</button>
          <button class="filter-tab" data-filter="customer">客户</button>
        </div>
        <div class="filter-search">
          <i class="fa fa-search" style="color:#879596;"></i>
          <input type="text" id="meeting-search" placeholder="搜索会议名称…">
        </div>
      </div>
      <div class="meeting-card-list" id="meetings-list">
        <div class="loading">加载中...</div>
      </div>
    </div>

  </div>

  <script src="js/app.js"></script>
  
</body>
</html>

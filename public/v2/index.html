<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会议纪要 v2</title>
  <link rel="stylesheet" href="css/style-v2.css">
  <link rel="stylesheet" href="../css/font-awesome.min.css">
</head>
<body>

  <!-- Masthead -->
  <nav class="v2-masthead">
    <div class="v2-masthead-logo">会议纪要 v2</div>
    <div class="v2-masthead-nav">
      <a href="./index.html" class="active">会议列表</a>
      <a href="./glossary.html">词汇表</a>
    </div>
    <div class="v2-masthead-actions">
      <button class="btn btn-outline" style="color:#fff;border-color:rgba(255,255,255,0.25);font-size:12px;" id="v2-search-toggle"><i class="fa fa-search"></i> <span>搜索</span></button>
      <label class="btn btn-gold" style="cursor:pointer;font-size:12px;">
        <i class="fa fa-cloud-upload"></i> <span>上传</span>
        <input type="file" id="upload-input" accept=".mp4,.mp3,.m4a,.ogg" multiple style="display:none;">
      </label>
    </div>
  </nav>

  <!-- Ruler Bar -->
  <div class="v2-ruler" id="v2-ruler">
    <span>本月统计加载中...</span>
  </div>

  <!-- Layout -->
  <div class="v2-layout">
    <!-- Sidebar -->
    <aside class="v2-sidebar">
      <div class="v2-sidebar-search">
        <i class="fa fa-search"></i>
        <input type="text" id="meeting-search" placeholder="搜索会议...">
      </div>

      <div class="v2-sidebar-section">
        <div class="v2-sidebar-label">会议类型</div>
        <button class="v2-sidebar-item filter-tab active" data-filter="all">全部</button>
        <button class="v2-sidebar-item filter-tab" data-filter="general">通用</button>
        <button class="v2-sidebar-item filter-tab" data-filter="weekly">周会</button>
        <button class="v2-sidebar-item filter-tab" data-filter="tech">技术讨论</button>
        <button class="v2-sidebar-item filter-tab" data-filter="customer">客户会议</button>
      </div>

      <div class="v2-sidebar-section">
        <div class="v2-sidebar-label">状态</div>
        <button class="v2-sidebar-item" data-status="all">全部状态</button>
        <button class="v2-sidebar-item" data-status="completed">已完成</button>
        <button class="v2-sidebar-item" data-status="processing">处理中</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="v2-main">
      <!-- Upload Area (hidden by default, toggled by button) -->
      <div class="v2-card" id="upload-area-card" style="display:none;">
        <div class="v2-card-title"><i class="fa fa-cloud-upload"></i> 上传音频 / 视频</div>
        <div class="upload-options">
          <label>会议类型：</label>
          <div class="meeting-type-pills">
            <input type="radio" name="meetingType" id="mt-general" value="general" checked>
            <label for="mt-general">通用</label>
            <input type="radio" name="meetingType" id="mt-weekly" value="weekly">
            <label for="mt-weekly">周会</label>
            <input type="radio" name="meetingType" id="mt-tech" value="tech">
            <label for="mt-tech">技术讨论</label>
            <input type="radio" name="meetingType" id="mt-customer" value="customer">
            <label for="mt-customer">客户</label>
          </div>
        </div>
        <div class="upload-area" id="upload-area">
          <i class="fa fa-cloud-upload"></i>
          <p>拖放 MP4 / MP3 / OGG 文件到此处，或点击选择</p>
          <p class="upload-hint">支持多段录音，最多 10 个文件</p>
        </div>
        <div class="upload-progress" id="upload-progress">
          <div class="progress-bar-wrap">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
          <div class="progress-text" id="progress-text">上传中...</div>
        </div>
      </div>

      <!-- Stats -->
      <div class="v2-stats" id="v2-stats">
        <div class="v2-stat-card">
          <div class="v2-stat-number" id="stat-total">-</div>
          <div class="v2-stat-label">本月会议</div>
        </div>
        <div class="v2-stat-card">
          <div class="v2-stat-number" id="stat-processing">-</div>
          <div class="v2-stat-label">处理中</div>
        </div>
        <div class="v2-stat-card">
          <div class="v2-stat-number" id="stat-duration">-</div>
          <div class="v2-stat-label">总时长(h)</div>
        </div>
        <div class="v2-stat-card">
          <div class="v2-stat-number" id="stat-actions">-</div>
          <div class="v2-stat-label">Action Items</div>
        </div>
      </div>

      <!-- Processing Banner -->
      <div class="v2-processing-banner" id="v2-processing-banner" style="display:none;">
        <span class="v2-processing-banner-icon">&#9881;</span>
        <span class="v2-processing-banner-text" id="v2-processing-text">正在处理中...</span>
        <div class="v2-processing-progress">
          <div class="v2-processing-progress-bar"></div>
        </div>
      </div>

      <!-- Meeting List -->
      <div class="meeting-card-list" id="meetings-list">
        <div class="loading">加载中...</div>
      </div>
    </main>
  </div>

  <!-- Mobile Tab Bar -->
  <div class="v2-mobile-tab-bar">
    <a href="./index.html" class="v2-mobile-tab active"><i class="fa fa-list"></i>会议</a>
    <a href="./glossary.html" class="v2-mobile-tab"><i class="fa fa-book"></i>词汇表</a>
    <button class="v2-mobile-tab" id="v2-mobile-upload"><i class="fa fa-cloud-upload"></i>上传</button>
  </div>

  <!-- Confirm Dialog -->
  <div id="confirm-modal" class="confirm-overlay" style="display:none;" role="dialog" aria-modal="true">
    <div class="confirm-box">
      <div class="confirm-icon">&#9888;&#65039;</div>
      <div class="confirm-title" id="confirm-title">确认删除</div>
      <div class="confirm-body" id="confirm-body">确认要删除这条记录吗？</div>
      <div class="confirm-actions">
        <button class="btn btn-outline btn-sm" id="confirm-cancel-btn">取消</button>
        <button class="btn confirm-delete-btn btn-sm" id="confirm-ok-btn">删除</button>
      </div>
    </div>
  </div>

  <!-- Upload Confirmation Dialog -->
  <div id="upload-confirm-modal" class="confirm-overlay" style="display:none;" role="dialog" aria-modal="true">
    <div class="confirm-box" style="width: 500px;">
      <div class="confirm-icon">&#9989;</div>
      <div class="confirm-title">上传成功，请确认会议信息</div>
      <div class="confirm-body">
        <div style="text-align: left; margin-top: 16px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 500;">会议名称：</label>
          <input type="text" id="upload-confirm-title" class="form-control" />
          <label style="display: block; margin-top: 16px; margin-bottom: 8px; font-weight: 500;">会议类型：</label>
          <div class="meeting-type-pills">
            <input type="radio" name="uploadConfirmMeetingType" id="uc-mt-general" value="general" checked>
            <label for="uc-mt-general">通用</label>
            <input type="radio" name="uploadConfirmMeetingType" id="uc-mt-weekly" value="weekly">
            <label for="uc-mt-weekly">周会</label>
            <input type="radio" name="uploadConfirmMeetingType" id="uc-mt-tech" value="tech">
            <label for="uc-mt-tech">技术讨论</label>
            <input type="radio" name="uploadConfirmMeetingType" id="uc-mt-customer" value="customer">
            <label for="uc-mt-customer">客户</label>
          </div>
        </div>
      </div>
      <div class="confirm-actions">
        <button class="btn btn-outline btn-sm" id="upload-confirm-cancel-btn">取消</button>
        <button class="btn btn-primary btn-sm" id="upload-confirm-ok-btn">开始转录</button>
      </div>
    </div>
  </div>

  <script src="js/app-v2.js"></script>
  <script>
  // V2-specific enhancements (stats, upload toggle, processing banner)
  (function() {
    // Toggle upload area
    var uploadCard = document.getElementById('upload-area-card');
    var uploadInput = document.getElementById('upload-input');

    // The masthead upload button (label wrapping input) triggers file select directly
    // Also handle mobile upload button
    var mobileUploadBtn = document.getElementById('v2-mobile-upload');
    if (mobileUploadBtn) {
      mobileUploadBtn.addEventListener('click', function() {
        uploadCard.style.display = uploadCard.style.display === 'none' ? 'block' : 'none';
        if (uploadCard.style.display === 'block') uploadCard.scrollIntoView({ behavior: 'smooth' });
      });
    }

    // Search toggle on masthead
    var searchToggle = document.getElementById('v2-search-toggle');
    var meetingSearch = document.getElementById('meeting-search');
    if (searchToggle && meetingSearch) {
      searchToggle.addEventListener('click', function() {
        meetingSearch.focus();
      });
    }

    // Update stats when meetings load - hook into fetchMeetings
    var _origRender = window.renderFilteredMeetings;
    if (_origRender) {
      window.renderFilteredMeetings = function() {
        _origRender.apply(this, arguments);
        updateV2Stats();
        updateV2ProcessingBanner();
        updateV2Ruler();
      };
    }

    function updateV2Stats() {
      var meetings = window.allMeetings || [];
      var now = new Date();
      var thisMonth = meetings.filter(function(m) {
        if (!m.createdAt) return false;
        var d = new Date(m.createdAt);
        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      });

      var processing = meetings.filter(function(m) {
        return ['pending', 'processing', 'transcribing', 'transcribed', 'reported'].indexOf(m.status) !== -1;
      });

      var totalActions = 0;
      meetings.forEach(function(m) {
        if (m.content && m.content.actions) totalActions += m.content.actions.length;
      });

      var el;
      el = document.getElementById('stat-total');
      if (el) el.textContent = thisMonth.length;
      el = document.getElementById('stat-processing');
      if (el) el.textContent = processing.length;
      el = document.getElementById('stat-actions');
      if (el) el.textContent = totalActions;
      el = document.getElementById('stat-duration');
      if (el) el.textContent = '-';
    }

    function updateV2ProcessingBanner() {
      var meetings = window.allMeetings || [];
      var processing = meetings.filter(function(m) {
        return ['pending', 'processing', 'transcribing'].indexOf(m.status) !== -1;
      });
      var banner = document.getElementById('v2-processing-banner');
      var textEl = document.getElementById('v2-processing-text');
      if (!banner) return;
      if (processing.length > 0) {
        banner.style.display = 'flex';
        textEl.textContent = processing.length + ' 个会议正在处理中...';
      } else {
        banner.style.display = 'none';
      }
    }

    function updateV2Ruler() {
      var meetings = window.allMeetings || [];
      var now = new Date();
      var thisMonth = meetings.filter(function(m) {
        if (!m.createdAt) return false;
        var d = new Date(m.createdAt);
        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      });
      var ruler = document.getElementById('v2-ruler');
      if (ruler) {
        var monthName = (now.getMonth() + 1) + ' 月';
        ruler.innerHTML = '<span>' + monthName + '</span><span class="v2-ruler-stat">' + thisMonth.length + ' 场会议</span><span class="v2-ruler-stat">' + meetings.length + ' 总计</span>';
      }
    }
  })();
  </script>
</body>
</html>

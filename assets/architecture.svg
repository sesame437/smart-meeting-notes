<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF9900"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff80"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF9900"/>
      <stop offset="100%" stop-color="#EC7211"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#232F3E" rx="0"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" fill="#FF9900" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="700">Meeting Minutes AI — System Architecture</text>

  <!-- ==================== Layer 1: User Layer ==================== -->
  <rect x="30" y="55" width="1140" height="70" rx="8" fill="none" stroke="#545B64" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="30" y="55" width="100" height="22" rx="4" fill="#545B64"/>
  <text x="80" y="70" text-anchor="middle" fill="#D5DBDB" font-family="Amazon Ember, Arial, sans-serif" font-size="11" font-weight="600">USER LAYER</text>

  <!-- Browser -->
  <rect x="420" y="72" width="160" height="42" rx="6" fill="#37475A" filter="url(#shadow)"/>
  <text x="500" y="98" text-anchor="middle" fill="#FAFAFA" font-family="Amazon Ember, Arial, sans-serif" font-size="13" font-weight="600">🖥 Web Browser</text>

  <!-- Mobile -->
  <rect x="620" y="72" width="160" height="42" rx="6" fill="#37475A" filter="url(#shadow)"/>
  <text x="700" y="98" text-anchor="middle" fill="#FAFAFA" font-family="Amazon Ember, Arial, sans-serif" font-size="13" font-weight="600">📱 Mobile Browser</text>

  <!-- Arrow: User → Frontend -->
  <line x1="500" y1="114" x2="500" y2="145" stroke="#FF9900" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="700" y1="114" x2="700" y2="145" stroke="#FF9900" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ==================== Layer 2: Frontend Layer ==================== -->
  <rect x="30" y="135" width="1140" height="80" rx="8" fill="none" stroke="#545B64" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="30" y="135" width="130" height="22" rx="4" fill="#545B64"/>
  <text x="95" y="150" text-anchor="middle" fill="#D5DBDB" font-family="Amazon Ember, Arial, sans-serif" font-size="11" font-weight="600">FRONTEND LAYER</text>

  <rect x="200" y="154" width="220" height="46" rx="6" fill="#1A3A5C" stroke="#2E7DB8" stroke-width="1" filter="url(#shadow)"/>
  <text x="310" y="174" text-anchor="middle" fill="#FAFAFA" font-family="Amazon Ember, Arial, sans-serif" font-size="12" font-weight="600">index.html</text>
  <text x="310" y="190" text-anchor="middle" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">会议列表 · 上传 · 合并</text>

  <rect x="450" y="154" width="220" height="46" rx="6" fill="#1A3A5C" stroke="#2E7DB8" stroke-width="1" filter="url(#shadow)"/>
  <text x="560" y="174" text-anchor="middle" fill="#FAFAFA" font-family="Amazon Ember, Arial, sans-serif" font-size="12" font-weight="600">meeting.html</text>
  <text x="560" y="190" text-anchor="middle" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">会议详情 · 报告 · 发邮件</text>

  <rect x="700" y="154" width="220" height="46" rx="6" fill="#1A3A5C" stroke="#2E7DB8" stroke-width="1" filter="url(#shadow)"/>
  <text x="810" y="174" text-anchor="middle" fill="#FAFAFA" font-family="Amazon Ember, Arial, sans-serif" font-size="12" font-weight="600">glossary.html</text>
  <text x="810" y="190" text-anchor="middle" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">词汇表管理</text>

  <!-- Arrow: Frontend → Backend -->
  <line x1="560" y1="200" x2="560" y2="230" stroke="#FF9900" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="575" y="222" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="9">REST API</text>

  <!-- ==================== Layer 3: Backend Layer ==================== -->
  <rect x="30" y="225" width="1140" height="115" rx="8" fill="none" stroke="#545B64" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="30" y="225" width="130" height="22" rx="4" fill="#545B64"/>
  <text x="95" y="240" text-anchor="middle" fill="#D5DBDB" font-family="Amazon Ember, Arial, sans-serif" font-size="11" font-weight="600">BACKEND LAYER</text>

  <!-- Express Server -->
  <rect x="340" y="250" width="440" height="40" rx="6" fill="#37475A" stroke="#FF9900" stroke-width="2" filter="url(#shadow)"/>
  <text x="560" y="275" text-anchor="middle" fill="#FF9900" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="700">Express Server · :3300</text>

  <!-- Routes -->
  <rect x="250" y="300" width="200" height="32" rx="5" fill="#1B2631" stroke="#5B9BD5" stroke-width="1"/>
  <text x="350" y="320" text-anchor="middle" fill="#5B9BD5" font-family="Amazon Ember, Arial, sans-serif" font-size="11" font-weight="600">routes/meetings.js</text>

  <rect x="480" y="300" width="200" height="32" rx="5" fill="#1B2631" stroke="#5B9BD5" stroke-width="1"/>
  <text x="580" y="320" text-anchor="middle" fill="#5B9BD5" font-family="Amazon Ember, Arial, sans-serif" font-size="11" font-weight="600">routes/glossary.js</text>

  <rect x="710" y="300" width="200" height="32" rx="5" fill="#1B2631" stroke="#48C9B0" stroke-width="1"/>
  <text x="810" y="320" text-anchor="middle" fill="#48C9B0" font-family="Amazon Ember, Arial, sans-serif" font-size="11" font-weight="600">services/*.js</text>

  <!-- Arrow: Backend → Workers -->
  <line x1="350" y1="332" x2="350" y2="370" stroke="#ffffff50" stroke-width="1.5" marker-end="url(#arrow-white)"/>
  <text x="310" y="356" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="9">SQS enqueue</text>

  <!-- ==================== Layer 4: Workers Layer ==================== -->
  <rect x="30" y="355" width="1140" height="100" rx="8" fill="none" stroke="#545B64" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="30" y="355" width="130" height="22" rx="4" fill="#545B64"/>
  <text x="95" y="370" text-anchor="middle" fill="#D5DBDB" font-family="Amazon Ember, Arial, sans-serif" font-size="11" font-weight="600">WORKERS LAYER</text>

  <!-- Transcription Worker -->
  <rect x="140" y="385" width="260" height="55" rx="6" fill="#2C1810" stroke="#FF9900" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="270" y="407" text-anchor="middle" fill="#FF9900" font-family="Amazon Ember, Arial, sans-serif" font-size="12" font-weight="700">⚙ Transcription Worker</text>
  <text x="270" y="427" text-anchor="middle" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">SQS → FunASR / Transcribe → S3</text>

  <!-- Report Worker -->
  <rect x="440" y="385" width="260" height="55" rx="6" fill="#2C1810" stroke="#FF9900" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="570" y="407" text-anchor="middle" fill="#FF9900" font-family="Amazon Ember, Arial, sans-serif" font-size="12" font-weight="700">⚙ Report Worker</text>
  <text x="570" y="427" text-anchor="middle" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">S3 transcript → Bedrock → Report</text>

  <!-- Export Worker -->
  <rect x="740" y="385" width="260" height="55" rx="6" fill="#2C1810" stroke="#FF9900" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="870" y="407" text-anchor="middle" fill="#FF9900" font-family="Amazon Ember, Arial, sans-serif" font-size="12" font-weight="700">⚙ Export Worker</text>
  <text x="870" y="427" text-anchor="middle" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">Report → HTML Email → SES</text>

  <!-- Flow arrows between workers -->
  <line x1="400" y1="412" x2="430" y2="412" stroke="#FF9900" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="700" y1="412" x2="730" y2="412" stroke="#FF9900" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ==================== Layer 5: AWS Services Layer ==================== -->
  <rect x="30" y="475" width="1140" height="300" rx="8" fill="none" stroke="#FF9900" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="30" y="475" width="160" height="22" rx="4" fill="#FF9900"/>
  <text x="110" y="490" text-anchor="middle" fill="#232F3E" font-family="Amazon Ember, Arial, sans-serif" font-size="11" font-weight="700">AWS SERVICES LAYER</text>

  <!-- S3 -->
  <rect x="60" y="510" width="200" height="70" rx="8" fill="#1B4332" stroke="#2ECC71" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="536" text-anchor="middle" fill="#2ECC71" font-family="Amazon Ember, Arial, sans-serif" font-size="13" font-weight="700">Amazon S3</text>
  <text x="160" y="554" text-anchor="middle" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">音频 · 转录 · 报告</text>
  <text x="160" y="570" text-anchor="middle" fill="#7D8A96" font-family="monospace, Arial" font-size="9">meeting-minutes/*</text>

  <!-- DynamoDB -->
  <rect x="290" y="510" width="200" height="70" rx="8" fill="#1B2A4A" stroke="#3498DB" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="390" y="536" text-anchor="middle" fill="#3498DB" font-family="Amazon Ember, Arial, sans-serif" font-size="13" font-weight="700">Amazon DynamoDB</text>
  <text x="390" y="554" text-anchor="middle" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">会议元数据 · 词汇表</text>
  <text x="390" y="570" text-anchor="middle" fill="#7D8A96" font-family="monospace, Arial" font-size="9">meeting-minutes-*</text>

  <!-- SQS -->
  <rect x="520" y="510" width="200" height="70" rx="8" fill="#4A1942" stroke="#9B59B6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="536" text-anchor="middle" fill="#9B59B6" font-family="Amazon Ember, Arial, sans-serif" font-size="13" font-weight="700">Amazon SQS</text>
  <text x="620" y="554" text-anchor="middle" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">任务队列 × 3</text>
  <text x="620" y="570" text-anchor="middle" fill="#7D8A96" font-family="monospace, Arial" font-size="9">transcription · report · export</text>

  <!-- Bedrock -->
  <rect x="60" y="605" width="320" height="70" rx="8" fill="#3D1F00" stroke="#FF9900" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="631" text-anchor="middle" fill="#FF9900" font-family="Amazon Ember, Arial, sans-serif" font-size="13" font-weight="700">Amazon Bedrock</text>
  <text x="220" y="649" text-anchor="middle" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">Claude Sonnet 4.6 · 报告生成</text>
  <text x="220" y="665" text-anchor="middle" fill="#7D8A96" font-family="Amazon Ember, Arial, sans-serif" font-size="10">Claude Haiku · 自动命名</text>

  <!-- SES -->
  <rect x="520" y="605" width="200" height="70" rx="8" fill="#4A2300" stroke="#E67E22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="631" text-anchor="middle" fill="#E67E22" font-family="Amazon Ember, Arial, sans-serif" font-size="13" font-weight="700">Amazon SES</text>
  <text x="620" y="649" text-anchor="middle" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">邮件发送</text>
  <text x="620" y="665" text-anchor="middle" fill="#7D8A96" font-family="monospace, Arial" font-size="9">us-west-2</text>

  <!-- EC2 GPU -->
  <rect x="750" y="510" width="200" height="165" rx="8" fill="#1A1A2E" stroke="#E74C3C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="850" y="540" text-anchor="middle" fill="#E74C3C" font-family="Amazon Ember, Arial, sans-serif" font-size="13" font-weight="700">Amazon EC2</text>
  <text x="850" y="558" text-anchor="middle" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">g6.2xlarge · GPU</text>
  <rect x="770" y="575" width="160" height="36" rx="4" fill="#2A1A2E"/>
  <text x="850" y="596" text-anchor="middle" fill="#F5B7B1" font-family="Amazon Ember, Arial, sans-serif" font-size="11" font-weight="600">FunASR 转录引擎</text>
  <text x="850" y="632" text-anchor="middle" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">CAM++ 说话人分离</text>
  <text x="850" y="652" text-anchor="middle" fill="#7D8A96" font-family="Amazon Ember, Arial, sans-serif" font-size="10">30 min 自动休眠</text>

  <!-- ==================== Data Flow Arrows ==================== -->
  <!-- Workers → S3 -->
  <line x1="270" y1="440" x2="160" y2="505" stroke="#2ECC71" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <line x1="570" y1="440" x2="160" y2="535" stroke="#2ECC71" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Workers → DynamoDB -->
  <line x1="320" y1="440" x2="370" y2="505" stroke="#3498DB" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <line x1="570" y1="440" x2="400" y2="505" stroke="#3498DB" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Workers → SQS -->
  <line x1="570" y1="440" x2="600" y2="505" stroke="#9B59B6" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Report Worker → Bedrock -->
  <line x1="500" y1="440" x2="300" y2="600" stroke="#FF9900" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Export Worker → SES -->
  <line x1="870" y1="440" x2="670" y2="600" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Transcription Worker → EC2/FunASR -->
  <line x1="330" y1="440" x2="810" y2="505" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Backend → DynamoDB -->
  <line x1="810" y1="332" x2="440" y2="505" stroke="#3498DB" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Legend -->
  <rect x="980" y="510" width="170" height="155" rx="6" fill="#1B2631" stroke="#545B64" stroke-width="1"/>
  <text x="1065" y="530" text-anchor="middle" fill="#D5DBDB" font-family="Amazon Ember, Arial, sans-serif" font-size="11" font-weight="600">Legend</text>

  <line x1="995" y1="545" x2="1025" y2="545" stroke="#FF9900" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1035" y="549" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">Data flow</text>

  <line x1="995" y1="565" x2="1025" y2="565" stroke="#2ECC71" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="1035" y="569" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">S3 storage</text>

  <line x1="995" y1="585" x2="1025" y2="585" stroke="#3498DB" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="1035" y="589" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">DynamoDB</text>

  <line x1="995" y1="605" x2="1025" y2="605" stroke="#9B59B6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="1035" y="609" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">SQS queue</text>

  <line x1="995" y1="625" x2="1025" y2="625" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="1035" y="629" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">FunASR</text>

  <line x1="995" y1="645" x2="1025" y2="645" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="1035" y="649" fill="#A0AAB4" font-family="Amazon Ember, Arial, sans-serif" font-size="10">Email (SES)</text>

  <!-- Footer -->
  <text x="600" y="788" text-anchor="middle" fill="#545B64" font-family="Amazon Ember, Arial, sans-serif" font-size="10">Meeting Minutes AI — Architecture Overview · AWS Region: us-west-2</text>
</svg>